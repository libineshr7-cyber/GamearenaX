<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Leaderboard - Free Fire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = { theme: { extend: {} }, corePlugins: { preflight: true } }
    </script>
</head>

<body class="min-h-screen bg-[#050505] text-white py-12 px-6 grain">
    <div class="max-w-6xl mx-auto">
        <a href="index.html"
            class="font-chakra flex items-center gap-2 text-[#A1A1AA] hover:text-[#FFD700] transition-colors mb-8">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
        </a>

        <div class="text-center mb-12">
            <h1 class="font-rajdhani font-bold text-5xl uppercase tracking-wide mb-4">
                <span class="text-purple-400">TOURNAMENT</span> LEADERBOARD
            </h1>

            <div class="max-w-md mx-auto mb-6">
                <select id="tournament-selector" onchange="tournamentChanged()"
                    class="w-full bg-zinc-900 border border-purple-500/30 px-4 py-3 text-white font-chakra focus:outline-none focus:border-purple-400 rounded-lg">
                    <option value="" disabled selected>Loading Tournaments...</option>
                </select>
            </div>

            <p class="font-chakra text-[#A1A1AA]">Ranks are dynamically computed based on BOOYAHs first, then Kills!</p>
        </div>

        <div
            class="bg-zinc-900/50 backdrop-blur-md border border-purple-500/30 rounded-xl p-4 sm:p-8 overflow-x-auto tracing-beam relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-purple-500/5 rounded-full blur-3xl pointer-events-none">
            </div>

            <table class="w-full text-left relative z-10">
                <thead>
                    <tr class="text-purple-400 font-rajdhani text-lg uppercase border-b border-purple-500/30">
                        <th class="p-4 rounded-tl-lg">RANK</th>
                        <th class="p-4">PLAYER (TEAM)</th>
                        <th class="p-4 text-center">BOOYAH VIP</th>
                        <th class="p-4 text-center">KILLS</th>
                        <th class="p-4 text-right rounded-tr-lg">WON PRIZE</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr>
                        <td colspan="5" class="p-8 text-center text-[#A1A1AA]">Loading Leaderboard...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        lucide.createIcons();
        let currentTournamentId = null;

        async function initTournaments() {
            try {
                const res = await fetch('http://localhost:8000/api/public/tournaments');
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const tournaments = await res.json();
                const selector = document.getElementById('tournament-selector');

                if (tournaments.length === 0) {
                    selector.innerHTML = '<option value="" disabled selected>No tournaments available</option>';
                    return;
                }

                selector.innerHTML = tournaments.map(t =>
                    `<option value="${t.id}">${t.name} - ${new Date(t.date).toLocaleDateString()}</option>`
                ).join('');

                const urlParams = new URLSearchParams(window.location.search);
                const queryTid = urlParams.get('tournament_id');

                if (queryTid && tournaments.find(t => t.id === queryTid)) {
                    currentTournamentId = queryTid;
                    selector.value = queryTid;
                } else {
                    currentTournamentId = tournaments[0].id;
                    selector.value = currentTournamentId;
                }

                loadLeaderboard();
            } catch (e) {
                console.error(e);
                document.getElementById('tournament-selector').innerHTML = '<option value="" disabled selected>Error loading tournaments</option>';
                document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">Failed to load data. Is backend running?</td></tr>';
            }
        }

        function tournamentChanged() {
            currentTournamentId = document.getElementById('tournament-selector').value;
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            if (!currentTournamentId) return;
            const body = document.getElementById('leaderboard-body');

            try {
                const res = await fetch(`http://localhost:8000/api/public/leaderboard?tournament_id=${currentTournamentId}`);
                const players = await res.json();

                if (!players || players.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" class="p-8 font-chakra text-center text-[#A1A1AA]">No players have been approved for this tournament yet.</td></tr>';
                    return;
                }

                body.innerHTML = players.map((p, index) => {
                    const rank = index + 1;
                    const rankStyle = rank === 1 ? 'text-[#FFD700] text-3xl font-bold' : rank === 2 ? 'text-zinc-300 text-2xl font-bold' : rank === 3 ? 'text-amber-600 text-xl font-bold' : 'text-[#A1A1AA] text-lg';

                    return `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition font-chakra">
                            <td class="p-4 ${rankStyle} font-rajdhani">#${rank}</td>
                            <td class="p-4">
                                <span class="font-bold text-lg block text-white">${p.player_name}</span>
                                <span class="text-xs text-purple-400 uppercase tracking-widest">${p.team_name}</span>
                            </td>
                            <td class="p-4 text-center">
                                ${p.is_booyah_winner ? '<span class="inline-block bg-[#FFD700] text-black px-2 py-1 rounded text-xs font-bold font-rajdhani uppercase"><i data-lucide="crown" class="w-3 h-3 inline mr-1 mb-0.5"></i>Win</span>' : '-'}
                            </td>
                            <td class="p-4 text-center font-bold text-white text-xl">${p.kills}</td>
                            <td class="p-4 text-right font-bold text-[#00FFFF] text-xl">₹${p.total_prize}</td>
                        </tr>
                    `;
                }).join('');

                lucide.createIcons();
            } catch (e) {
                console.error(e);
                body.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">Failed to load leaderboard. Server may be down.</td></tr>';
            }
        }

        initTournaments();
        setInterval(loadLeaderboard, 30000);
    </script>
</body>

</html>

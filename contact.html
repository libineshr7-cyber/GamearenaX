<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Free Fire</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="tailwind.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        window.getApiUrl = function () {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000/api';
            }
            if (window.location.hostname.includes('onrender.com')) return '/api';
            return 'https://gamearenax.onrender.com/api';
        };
    </script>
</head>

<body class="min-h-screen bg-[#050505] text-white py-12 px-6 grain">
    <div class="max-w-4xl mx-auto">
        <a href="index.html"
            class="font-chakra flex items-center gap-2 text-[#A1A1AA] hover:text-[#FFD700] transition-colors mb-8">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
        </a>
        <div class="text-center mb-12">
            <h1 class="font-rajdhani font-bold text-5xl uppercase tracking-wide mb-4">
                <span class="text-[#FFD700]">CONTACT</span> US
            </h1>
            <p class="font-chakra text-[#A1A1AA]">Raise a complaint, ask a question, or get support from the admins.</p>
        </div>
        <div class="bg-zinc-900/50 backdrop-blur-md border border-white/10 rounded-xl p-8 tracing-beam">
            <form id="contact-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="font-chakra text-sm text-[#A1A1AA] mb-2 block">YOUR NAME</label>
                        <input type="text" name="name" required
                            class="w-full bg-transparent border-b-2 border-white/20 rounded-none px-0 py-3 focus:border-[#FFD700] focus:outline-none transition-colors font-chakra text-white"
                            placeholder="Enter your name" />
                    </div>
                    <div>
                        <label class="font-chakra text-sm text-[#A1A1AA] mb-2 block">EMAIL ADDRESS</label>
                        <input type="email" name="email" required
                            class="w-full bg-transparent border-b-2 border-white/20 rounded-none px-0 py-3 focus:border-[#FFD700] focus:outline-none transition-colors font-chakra text-white"
                            placeholder="Enter your email address" />
                    </div>
                </div>
                <div>
                    <label class="font-chakra text-sm text-[#A1A1AA] mb-2 block">SUBJECT / REASON</label>
                    <select name="subject" required
                        class="w-full bg-black border-b-2 border-white/20 rounded-none px-0 py-3 focus:border-[#FFD700] focus:outline-none transition-colors font-chakra text-white">
                        <option value="General Inquiry">General Inquiry</option>
                        <option value="Registration Issue">Registration Issue</option>
                        <option value="Payment Problem">Payment Problem</option>
                        <option value="Complaint">Raise a Complaint</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label class="font-chakra text-sm text-[#A1A1AA] mb-2 block">MESSAGE</label>
                    <textarea name="message" required rows="5"
                        class="w-full bg-transparent border border-white/20 rounded-lg p-4 focus:border-[#FFD700] focus:outline-none transition-colors font-chakra text-white"
                        placeholder="Describe your issue or question..."></textarea>
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full font-rajdhani font-bold px-8 py-4 bg-[#FFD700] text-black hover:bg-[#E6C200] tactical-clip tracking-widest text-lg">SEND
                    MESSAGE</button>
            </form>
            <div id="success-msg"
                class="hidden mt-6 bg-green-500/20 border border-green-500 text-green-400 p-4 rounded-lg font-chakra text-center">
                Your message has been sent to the admins!
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "SENDING...";
            btn.disabled = true;
            try {
                const res = await fetch(window.getApiUrl() + '/public/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: e.target.name.value,
                        email: e.target.email.value,
                        subject: e.target.subject.value,
                        message: e.target.message.value
                    })
                });
                if (res.ok) {
                    e.target.reset();
                    document.getElementById('contact-form').style.display = 'none';
                    document.getElementById('success-msg').classList.remove('hidden');
                } else {
                    alert('Error submitting form');
                    btn.innerText = "SEND MESSAGE";
                    btn.disabled = false;
                }
            } catch {
                alert('Network error');
                btn.innerText = "SEND MESSAGE";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Slots - Free Fire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = { theme: { extend: {} }, corePlugins: { preflight: true } }
    </script>
    <script>
        window.getApiUrl = function () { if (window.location.hostname.includes('onrender.com')) return '/api'; if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') { return 'http://localhost:8000/api'; } return window.location.protocol + '//' + window.location.hostname + ':8000/api'; };
    </script>
</head>

<body class="min-h-screen bg-[#050505] text-white py-12 px-4 grain">
    <div class="max-w-6xl mx-auto relative z-10">
        <div class="flex items-center justify-between mb-8">
            <a href="index.html"
                class="font-chakra flex items-center gap-2 text-[#A1A1AA] hover:text-[#FFD700] transition-colors">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
            </a>
            <a href="register.html" id="top-register-btn"
                class="font-rajdhani font-bold px-6 py-2 bg-[#FFD700] text-black hover:bg-[#E6C200] tactical-clip uppercase tracking-widest hidden sm:inline-block">Register</a>
        </div>

        <div class="text-center mb-12">
            <h1 class="font-rajdhani font-bold text-4xl sm:text-5xl uppercase tracking-wide mb-4">
                <span class="text-[#FFD700]">TOURNAMENT</span> SLOTS
            </h1>

            <div class="max-w-md mx-auto mb-6">
                <select id="tournament-selector" onchange="tournamentChanged()"
                    class="w-full bg-zinc-900 border border-[#FFD700]/30 px-4 py-3 text-white font-chakra focus:outline-none focus:border-[#FFD700] rounded-lg">
                    <option value="" disabled selected>Loading Tournaments...</option>
                </select>
            </div>

            <p class="font-chakra text-[#A1A1AA] mb-4">Check available slots below. Green slots are free, Red are
                occupied.</p>
            <div class="flex justify-center gap-6 font-chakra text-sm">
                <div class="flex items-center gap-2"><span
                        class="w-4 h-4 bg-zinc-800 border border-green-500 rounded"></span> Available</div>
                <div class="flex items-center gap-2"><span
                        class="w-4 h-4 bg-red-500/10 border border-red-500/30 rounded"></span> Occupied/Pending</div>
            </div>
        </div>

        <div id="slots-grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-10 gap-2 sm:gap-4">
            <!-- Slots will be populated here -->
        </div>

        <div class="mt-12 text-center sm:hidden">
            <a href="register.html" id="bottom-register-btn"
                class="w-full font-rajdhani font-bold px-8 py-4 bg-[#FFD700] text-black hover:bg-[#E6C200] tactical-clip uppercase tracking-widest inline-block text-lg">REGISTER
                NOW</a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let currentTournamentId = null;

        async function initTournaments() {
            try {
                const res = await fetch(window.getApiUrl() + '/public/tournaments');
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const tournaments = await res.json();
                const selector = document.getElementById('tournament-selector');

                if (tournaments.length === 0) {
                    selector.innerHTML = '<option value="" disabled selected>No tournaments available</option>';
                    return;
                }

                selector.innerHTML = tournaments.map(t =>
                    `<option value="${t.id}">${t.name} - ${new Date(t.date).toLocaleDateString()}</option>`
                ).join('');

                const urlParams = new URLSearchParams(window.location.search);
                const queryTid = urlParams.get('tournament_id');

                if (queryTid && tournaments.find(t => t.id === queryTid)) {
                    currentTournamentId = queryTid;
                    selector.value = queryTid;
                } else {
                    currentTournamentId = tournaments[0].id;
                    selector.value = currentTournamentId;
                }

                loadSlots();
            } catch (e) {
                console.error(e);
                document.getElementById('tournament-selector').innerHTML = '<option value="" disabled selected>Error loading tournaments. Backend down?</option>';
                document.getElementById('slots-grid').innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load slots data. Is backend running?</p>';
            }
        }

        function tournamentChanged() {
            currentTournamentId = document.getElementById('tournament-selector').value;
            loadSlots();
        }

        async function loadSlots() {
            if (!currentTournamentId) return;
            const grid = document.getElementById('slots-grid');
            try {
                document.getElementById('top-register-btn').href = `register.html?tournament_id=${currentTournamentId}`;
                document.getElementById('bottom-register-btn').href = `register.html?tournament_id=${currentTournamentId}`;

                const fetchUrl = `${window.getApiUrl()}/slots?tournament_id=${currentTournamentId}`;
                const res = await fetch(fetchUrl);
                const slots = await res.json();

                if (!slots || slots.length === 0) {
                    grid.innerHTML = '<p class="text-[#A1A1AA] col-span-full text-center">No slots found or not an active tournament.</p>';
                    return;
                }

                grid.innerHTML = slots.map(s => {
                    const isAvail = s.status === 'available';
                    return `
                        <div class="aspect-square flex flex-col items-center justify-center rounded-lg border ${isAvail ? 'bg-zinc-800 border-green-500/50 hover:border-green-400' : 'bg-red-500/10 border-red-500/30'} transition-colors p-1">
                            <span class="font-rajdhani font-bold text-2xl sm:text-3xl ${isAvail ? 'text-green-400' : 'text-red-400'}">#${s.slot_number}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                grid.innerHTML = '<p class="text-red-500 col-span-full text-center">Failed to load slots data. Is backend running?</p>';
            }
        }
        initTournaments();
        // refresh every 10 seconds
        setInterval(loadSlots, 10000);
    </script>
</body>

</html>

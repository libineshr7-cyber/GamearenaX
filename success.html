<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Success</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="tailwind.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        window.getApiUrl = function () {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000/api';
            }
            if (window.location.hostname.includes('onrender.com')) return '/api';
            return 'https://gamearenax.onrender.com/api';
        };
    </script>
</head>

<body class="min-h-screen bg-[#050505] text-white flex items-center justify-center">
    <div
        class="text-center bg-zinc-900/50 p-12 rounded-xl border border-[#FFD700]/30 tactical-clip z-10 w-full max-w-lg">
        <i data-lucide="check-circle" class="w-24 h-24 text-[#FFD700] mx-auto mb-6 neon-glow"></i>
        <h1 class="font-rajdhani font-bold text-4xl text-[#FFD700] mb-4">SUCCESSFUL!</h1>
        <p class="font-chakra text-[#A1A1AA] mb-8 text-lg">Your registration is under review.</p>
        <a href="index.html"
            class="inline-block bg-[#FFD700] text-black px-8 py-4 tactical-clip font-rajdhani font-bold uppercase tracking-widest hover:bg-[#E6C200] transition-colors">GO
            HOME</a>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>

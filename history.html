<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament History - Free Fire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = { theme: { extend: {} }, corePlugins: { preflight: true } }
    </script>
    <script>
        window.getApiUrl = function () {
            if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000/api';
            }
            return window.location.protocol + '//' + window.location.hostname + ':8000/api';
        };
    </script>
</head>

<body class="min-h-screen bg-[#050505] text-white py-12 px-6 grain">
    <div class="max-w-6xl mx-auto">
        <a href="index.html"
            class="font-chakra flex items-center gap-2 text-[#A1A1AA] hover:text-[#FFD700] transition-colors mb-8">
            <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Home
        </a>

        <div class="text-center mb-12">
            <h1 class="font-rajdhani font-bold text-5xl uppercase tracking-wide mb-4">
                <span class="text-zinc-500">PAST</span> TOURNAMENTS
            </h1>
            <p class="font-chakra text-[#A1A1AA]">View the history of previously played matches.</p>
        </div>

        <div id="history-container" class="space-y-6">
            <div class="text-center text-[#A1A1AA] font-chakra p-12">Loading history...</div>
        </div>
    </div>
    <script>
        lucide.createIcons();

        async function loadHistory() {
            try {
                const res = await fetch(window.getApiUrl() + '/public/tournaments');
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const tournaments = await res.json();

                // Filter out the active tournament
                const past = tournaments.filter(t => !t.is_active);

                const container = document.getElementById('history-container');

                if (past.length === 0) {
                    container.innerHTML = '<div class="bg-zinc-900/50 p-12 rounded-xl text-center font-chakra text-[#A1A1AA] border border-white/10">No past tournaments found yet.</div>';
                    return;
                }

                container.innerHTML = past.map(t => {
                    const dateObj = new Date(t.date);
                    const dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString() : 'Unknown Date';

                    return `
                    <div class="bg-zinc-900/50 backdrop-blur border border-white/10 rounded-xl p-6 hover:border-zinc-500/50 transition-colors">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h3 class="font-rajdhani font-bold text-3xl text-zinc-300 uppercase leading-none mb-2">${t.name}</h3>
                                <p class="font-chakra text-[#A1A1AA] flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> ${dateStr} • ${t.max_slots} Slots</p>
                            </div>
                            <div>
                                <a href="leaderboard.html?tournament_id=${t.id}" class="inline-block px-6 py-3 border border-purple-500/50 text-purple-400 font-rajdhani font-bold uppercase tracking-widest rounded hover:bg-purple-500/10 transition-colors">View Winners</a>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                document.getElementById('history-container').innerHTML = '<div class="bg-red-500/10 border border-red-500/30 text-red-400 p-8 rounded-xl text-center font-chakra">Failed to load history. Backend unreachable.</div>';
            }
        }

        loadHistory();
    </script>
</body>

</html>
